name: 15-Minute News Auto Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # Idi automatic ga write access ichi Exit Code 128 ni fix chestundi

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Node 20 warning povalante v4 use cheyali

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'  # Typo fixed here

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run News Scraper Agent
      run: python fetch_news.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "AI-News-Agent"
        git config --global user.email "agent@nint.co.in"
        git add index.html
        git commit -m "Automated 15-Min News Sync with Images" || exit 0
        git push
