  const running = workflows.filter((w) => w.status === "running").length;
  const errors = workflows.filter((w) => w.status === "error").length;
  const totalCycles = workflows.reduce((s, w) => s + w.cycleCount, 0);

  return (
    <div
      style={{
        background: COLORS.surface,
        border: `1px solid ${COLORS.border}`,
        borderRadius: 8,
        padding: "14px 20px",
        display: "flex",
        gap: 32,
        alignItems: "center",
        marginBottom: 20,
      }}
    >
      <div>
        <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 800, color: avg >= 80 ? COLORS.accent : avg >= 50 ? COLORS.warn : COLORS.danger }}>
