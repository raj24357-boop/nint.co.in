          <span style={{ fontSize: 12, color: COLORS.textSub, fontWeight: 400 }}>/100</span>
        </div>
        <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: "0.1em", textTransform: "uppercase" }}>System Health</div>
      </div>
      <HealthBar value={avg} height={6} />
      <div style={{ display: "flex", gap: 24, flexShrink: 0 }}>
        <StatChip label="Running" value={running} color={COLORS.accent} />
        <StatChip label="Errors" value={errors} color={errors > 0 ? COLORS.danger : COLORS.textDim} />
        <StatChip label="Total Cycles" value={totalCycles} color={COLORS.info} />
      </div>
    </div>
  );
}

function StatChip({ label, value, color }) {
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ fontSize: 18, fontWeight: 700, color, fontFamily: "'Syne', sans-serif" }}>{value}</div>
      <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: "0.1em", textTransform: "uppercase" }}>{label}</div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
export default function AutoSyncDashboard() {
  const [workflows, setWorkflows] = useState(createWorkflowState);
  const [selected, setSelected] = useState(WORKFLOW_DEFS[0].id);
  const [activeTab, setActiveTab] = useState("sections"); // sections | logs | cycles
  const [paused, setPaused] = useState(false);
  const [tick, setTick] = useState(0);
  const logsEndRef = useRef(null);
  const timerRefs = useRef({});
  const abortRefs = useRef({});
  const pausedRef = useRef(false);

  pausedRef.current = paused;

  // Tick for countdown display
  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  // Auto-scroll logs
  useEffect(() => {
    logsEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [workflows]);

  // Scheduler
  const scheduleWorkflow = useCallback((wfId) => {
    const def = WORKFLOW_DEFS.find((d) => d.id === wfId);
    if (!def) return;

    const run = async () => {
      if (pausedRef.current) {
        timerRefs.current[wfId] = setTimeout(run, 1000);
        return;
      }

      // Check if this workflow is already running
      setWorkflows((prev) => {
        const w = prev.find((x) => x.id === wfId);
        if (w?.status === "running") return prev;
        return prev;
      });

      const ctrl = new AbortController();
      abortRefs.current[wfId] = ctrl;

      await runWorkflowCycle(wfId, setWorkflows, ctrl.signal);

      setWorkflows((prev) =>
        prev.map((w) => (w.id === wfId ? { ...w, nextRun: Date.now() + def.intervalMs } : w))
      );

      timerRefs.current[wfId] = setTimeout(run, def.intervalMs);
    };

    const w = WORKFLOW_DEFS.find((d) => d.id === wfId);
    const initial = w ? Math.random() * w.intervalMs * 0.5 : 2000;
    timerRefs.current[wfId] = setTimeout(run, initial);
  }, []);

  useEffect(() => {
    WORKFLOW_DEFS.forEach((def) => scheduleWorkflow(def.id));
    return () => {
      Object.values(timerRefs.current).forEach(clearTimeout);
      Object.values(abortRefs.current).forEach((c) => c.abort());
    };
  }, [scheduleWorkflow]);

  const selectedWf = workflows.find((w) => w.id === selected);

  const triggerNow = (wfId) => {
    const def = WORKFLOW_DEFS.find((d) => d.id === wfId);
    if (!def) return;
    clearTimeout(timerRefs.current[wfId]);
    abortRefs.current[wfId]?.abort();

    const ctrl = new AbortController();
    abortRefs.current[wfId] = ctrl;
    runWorkflowCycle(wfId, setWorkflows, ctrl.signal).then(() => {
      setWorkflows((prev) =>
        prev.map((w) => (w.id === wfId ? { ...w, nextRun: Date.now() + def.intervalMs } : w))
      );
      timerRefs.current[wfId] = setTimeout(() => triggerNow(wfId), def.intervalMs);
    });
  };

  return (
    <>
      <style>{globalStyle}</style>
      <div
        style={{
          minHeight: "100vh",
          background: COLORS.bg,
          display: "flex",
          flexDirection: "column",
          padding: "0 0 40px",
        }}
      >
        {/* Header */}
        <div
          style={{
            background: COLORS.surface,
            borderBottom: `1px solid ${COLORS.border}`,
            padding: "12px 24px",
            display: "flex",
            alignItems: "center",
            gap: 16,
            position: "sticky",
            top: 0,
            zIndex: 100,
          }}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div
              style={{
                width: 28,
                height: 28,
                border: `2px solid ${COLORS.accent}`,
                borderRadius: 6,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 14,
                color: COLORS.accent,
                fontWeight: 800,
              }}
            >
              ⟳
            </div>
            <span
              style={{
                fontFamily: "'Syne', sans-serif",
                fontSize: 16,
                fontWeight: 800,
                color: COLORS.text,
                letterSpacing: "0.04em",
              }}
            >
              AUTO-SYNC ENGINE
            </span>
            <span
              style={{
                fontSize: 9,
                color: COLORS.textDim,
                letterSpacing: "0.1em",
                fontWeight: 600,
                background: COLORS.surfaceAlt,
                padding: "2px 6px",
                borderRadius: 3,
                border: `1px solid ${COLORS.border}`,
              }}
            >
              v2.0
            </span>
          </div>

          <div style={{ flex: 1 }} />

          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span
              style={{
                fontSize: 10,
                color: paused ? COLORS.warn : COLORS.accent,
                letterSpacing: "0.08em",
                animation: paused ? "none" : "blink 2s ease infinite",
              }}
            >
              {paused ? "● PAUSED" : "● LIVE"}
            </span>
            <button
              onClick={() => setPaused((p) => !p)}
              style={{
                background: paused ? COLORS.warnDim : COLORS.accentDim,
                border: `1px solid ${paused ? COLORS.warn : COLORS.accent}44`,
                color: paused ? COLORS.warn : COLORS.accent,
                padding: "5px 14px",
                borderRadius: 4,
                cursor: "pointer",
                fontSize: 11,
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: "0.05em",
                fontWeight: 600,
              }}
            >
              {paused ? "RESUME" : "PAUSE"}
            </button>
          </div>
        </div>

        <div style={{ padding: "20px 24px", flex: 1 }}>
          {/* Global Health */}
          <GlobalHealthBar workflows={workflows} />

          <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 20, height: "calc(100vh - 220px)", minHeight: 500 }}>
            {/* Left: Workflow List */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, overflowY: "auto" }}>
              <div
                style={{
                  fontSize: 9,
                  color: COLORS.textDim,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  fontWeight: 700,
                  marginBottom: 4,
                }}
              >
                Workflows ({WORKFLOW_DEFS.length})
              </div>
              {workflows.map((wf) => (
                <WorkflowCard
                  key={wf.id}
                  wf={wf}
                  active={selected === wf.id}
                  onClick={() => setSelected(wf.id)}
                />
              ))}
            </div>

            {/* Right: Detail Panel */}
            {selectedWf && (
              <div
                style={{
                  background: COLORS.surface,
                  border: `1px solid ${COLORS.border}`,
                  borderRadius: 8,
                  display: "flex",
                  flexDirection: "column",
                  overflow: "hidden",
                }}
              >
                {/* Detail Header */}
                <div
                  style={{
                    padding: "14px 20px",
                    borderBottom: `1px solid ${COLORS.border}`,
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    flexShrink: 0,
                  }}
                >
                  <span style={{ fontSize: 20, color: selectedWf.color }}>{selectedWf.icon}</span>
                  <div>
                    <div
                      style={{
                        fontFamily: "'Syne', sans-serif",
                        fontSize: 16,
                        fontWeight: 700,
                        color: COLORS.text,
                      }}
                    >
                      {selectedWf.name}
                    </div>
                    <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: "0.08em" }}>
                      Priority: <span style={{ color: selectedWf.priority === "CRITICAL" ? COLORS.danger : selectedWf.priority === "HIGH" ? COLORS.warn : selectedWf.priority === "MEDIUM" ? COLORS.info : COLORS.textSub }}>{selectedWf.priority}</span>
                      &nbsp;·&nbsp;Interval: {selectedWf.intervalMs / 1000}s
                      &nbsp;·&nbsp;Avg: {selectedWf.avgDuration}ms
                      &nbsp;·&nbsp;Errors: {selectedWf.errorCount}
                    </div>
                  </div>
                  <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                    <button
                      onClick={() => triggerNow(selectedWf.id)}
                      disabled={selectedWf.status === "running"}
                      style={{
                        background: selectedWf.status === "running" ? COLORS.surfaceAlt : `${selectedWf.color}22`,
                        border: `1px solid ${selectedWf.status === "running" ? COLORS.border : selectedWf.color + "55"}`,
                        color: selectedWf.status === "running" ? COLORS.textDim : selectedWf.color,
                        padding: "5px 14px",
                        borderRadius: 4,
                        cursor: selectedWf.status === "running" ? "not-allowed" : "pointer",
                        fontSize: 11,
                        fontFamily: "'JetBrains Mono', monospace",
                        fontWeight: 600,
                        letterSpacing: "0.05em",
                      }}
                    >
                      {selectedWf.status === "running" ? "RUNNING…" : "▶ TRIGGER NOW"}
                    </button>
                  </div>
                </div>

                {/* Tabs */}
                <div
                  style={{
                    display: "flex",
                    borderBottom: `1px solid ${COLORS.border}`,
                    flexShrink: 0,
                  }}
                >
                  {["sections", "logs", "cycles"].map((tab) => (
                    <button
                      key={tab}
                      onClick={() => setActiveTab(tab)}
                      style={{
                        padding: "10px 20px",
                        background: "none",
                        border: "none",
                        borderBottom: `2px solid ${activeTab === tab ? selectedWf.color : "transparent"}`,
                        color: activeTab === tab ? selectedWf.color : COLORS.textSub,
                        cursor: "pointer",
                        fontFamily: "'JetBrains Mono', monospace",
                        fontSize: 11,
                        letterSpacing: "0.08em",
                        fontWeight: activeTab === tab ? 700 : 400,
                        textTransform: "uppercase",
                        transition: "all 0.15s",
                      }}
                    >
                      {tab}
                      {tab === "logs" && (
                        <span
                          style={{
                            marginLeft: 6,
                            fontSize: 9,
                            background: `${selectedWf.color}22`,
                            color: selectedWf.color,
                            padding: "1px 5px",
                            borderRadius: 3,
                          }}
                        >
                          {selectedWf.logs.length}
                        </span>
                      )}
                      {tab === "cycles" && (
                        <span
                          style={{
                            marginLeft: 6,
                            fontSize: 9,
                            background: COLORS.surfaceAlt,
                            color: COLORS.textSub,
                            padding: "1px 5px",
                            borderRadius: 3,
                          }}
                        >
                          {selectedWf.cycles.length}
                        </span>
                      )}
                    </button>
                  ))}
                </div>

                {/* Tab Content */}
                <div style={{ flex: 1, overflow: "auto", padding: "16px 20px" }}>
                  {/* SECTIONS TAB */}
                  {activeTab === "sections" && (
                    <div>
                      <div
                        style={{
                          fontSize: 9,
                          color: COLORS.textDim,
                          letterSpacing: "0.1em",
                          textTransform: "uppercase",
                          marginBottom: 12,
                        }}
                      >
                        Pipeline Sections — Live Progress
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {selectedWf.sections.map((section) => (
                          <SectionPill
                            key={section}
                            section={section}
                            status={selectedWf.sectionProgress[section] || "pending"}
                            color={selectedWf.color}
                          />
                        ))}
                      </div>

                      {selectedWf.status === "idle" && selectedWf.cycleCount === 0 && (
                        <div
                          style={{
                            marginTop: 24,
                            padding: "16px",
                            background: COLORS.surfaceAlt,
                            borderRadius: 6,
                            border: `1px dashed ${COLORS.borderBright}`,
                            textAlign: "center",
                            color: COLORS.textDim,
                            fontSize: 11,
                          }}
                        >
                          Waiting for first cycle…
                        </div>
                      )}

                      {selectedWf.cycleCount > 0 && (
                        <div
                          style={{
                            marginTop: 20,
                            padding: "12px 16px",
                            background: COLORS.surfaceAlt,
                            borderRadius: 6,
                            border: `1px solid ${COLORS.border}`,
                          }}
                        >
                          <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>
                            Runtime Stats
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
                            <Metric label="Health" value={`${selectedWf.health}%`} color={selectedWf.health >= 80 ? COLORS.success : selectedWf.health >= 50 ? COLORS.warn : COLORS.danger} />
                            <Metric label="Cycles" value={selectedWf.cycleCount} />
                            <Metric label="Avg Duration" value={`${selectedWf.avgDuration}ms`} />
                            <Metric label="Errors" value={selectedWf.errorCount} color={selectedWf.errorCount > 0 ? COLORS.danger : COLORS.textSub} />
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* LOGS TAB */}
                  {activeTab === "logs" && (
                    <div>
                      <div
                        style={{
                          fontSize: 9,
                          color: COLORS.textDim,
                          letterSpacing: "0.1em",
                          textTransform: "uppercase",
                          marginBottom: 10,
                        }}
                      >
                        Execution Log — Last {selectedWf.logs.length} entries
                      </div>
                      <div
                        style={{
                          background: COLORS.surfaceAlt,
                          border: `1px solid ${COLORS.border}`,
                          borderRadius: 6,
                          padding: "12px",
                          maxHeight: 420,
                          overflowY: "auto",
                          display: "flex",
                          flexDirection: "column",
                          gap: 2,
                        }}
                      >
                        {selectedWf.logs.length === 0 && (
                          <span style={{ color: COLORS.textDim, fontSize: 11 }}>No logs yet…</span>
                        )}
                        {selectedWf.logs.map((entry) => (
                          <LogLine key={entry.id} entry={entry} />
                        ))}
                        <div ref={logsEndRef} />
                      </div>
                    </div>
                  )}

                  {/* CYCLES TAB */}
                  {activeTab === "cycles" && (
                    <div>
                      <div
                        style={{
                          fontSize: 9,
                          color: COLORS.textDim,
                          letterSpacing: "0.1em",
                          textTransform: "uppercase",
                          marginBottom: 10,
                        }}
                      >
                        Cycle History — Last {selectedWf.cycles.length} runs
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {selectedWf.cycles.length === 0 && (
                          <div
                            style={{
                              padding: "20px",
                              textAlign: "center",
                              color: COLORS.textDim,
                              fontSize: 11,
                              border: `1px dashed ${COLORS.border}`,
                              borderRadius: 6,
                            }}
                          >
                            No cycles completed yet
                          </div>
                        )}
                        {selectedWf.cycles.map((cycle) => (
                          <CycleBadge key={cycle.id} cycle={cycle} />
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div
          style={{
            padding: "8px 24px",
            borderTop: `1px solid ${COLORS.border}`,
            display: "flex",
            gap: 20,
            alignItems: "center",
            background: COLORS.surface,
            marginTop: 20,
          }}
        >
          {workflows.map((wf) => (
            <div key={wf.id} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <StatusDot status={wf.status} color={wf.color} />
              <span style={{ fontSize: 10, color: COLORS.textDim }}>{wf.name}</span>
            </div>
          ))}
          <div style={{ marginLeft: "auto", fontSize: 10, color: COLORS.textDim, letterSpacing: "0.06em" }}>
            AUTO-SYNC ENGINE · WORKFLOW ORCHESTRATOR
          </div>
        </div>
      </div>
    </>
  );
}
