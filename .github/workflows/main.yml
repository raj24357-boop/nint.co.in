function renderLog(section) {
  const templates = LOG_TEMPLATES[section] || ["Processing..."];
  const r = (n, m = 100) => Math.floor(Math.random() * m + n);
  return templates[Math.floor(Math.random() * templates.length)]
    .replace("{v}", `${r(1, 9)}.${r(0, 99)}.${r(0, 999)}`)
    .replace("{n}", r(2, 50))
    .replace("{m}", r(1, 20))
    .replace("{h}", Math.random().toString(16).slice(2, 10))
    .replace("{f}", Math.random().toString(16).slice(2, 10))
    .replace("{t}", r(10, 500))
    .replace("{d}", r(1, 30))
    .replace("{b}", r(1, 20))
    .replace("{r}", r(100, 9999))
    .replace("{s}", r(75, 100))
    .replace("{l}", r(70, 95))
    .replace("{c}", r(10, 80))
    .replace("{a}", r(5, 50))
    .replace("{b}", r(50, 150))
    .replace("{c}", r(150, 400));
}

// ── State Machine ─────────────────────────────────────────────────────────────
function createWorkflowState() {
  return WORKFLOW_DEFS.map((def) => ({
    ...def,
    status: "idle",
    cycleCount: 0,
    lastRun: null,
    nextRun: Date.now() + def.intervalMs,
    currentSection: null,
    sectionProgress: {},
    logs: [],
    cycles: [],
    health: 100,
    errorCount: 0,
    avgDuration: 0,
    totalDuration: 0,
  }));
}

// ── Simulation Engine ─────────────────────────────────────────────────────────
async function runWorkflowCycle(wfId, setState, signal) {
  const def = WORKFLOW_DEFS.find((d) => d.id === wfId);
  if (!def) return;

  const cycleId = uid();
  const cycleStart = Date.now();
  const sectionResults = [];

  setState((prev) =>
    prev.map((w) =>
      w.id !== wfId
        ? w
        : {
            ...w,
            status: "running",
            currentSection: null,
            sectionProgress: {},
            logs: [
              ...w.logs.slice(-200),
              { id: uid(), time: ts(), level: "INFO", msg: `── Cycle #${w.cycleCount + 1} started ──`, section: null },
            ],
          }
    )
  );

  for (const section of def.sections) {
    if (signal.aborted) return;

    const sectionStart = Date.now();
    const shouldFail = Math.random() < 0.06; // 6% failure rate per section

    setState((prev) =>
      prev.map((w) =>
        w.id !== wfId
          ? w
          : {
              ...w,
              currentSection: section,
              sectionProgress: { ...w.sectionProgress, [section]: "running" },
              logs: [
                ...w.logs.slice(-200),
                { id: uid(), time: ts(), level: "INFO", msg: `→ ${SECTION_LABELS[section]}`, section },
              ],
            }
      )
    );

    // Emit 2-4 log lines per section with timing
    const logCount = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < logCount; i++) {
      if (signal.aborted) return;
      await sleep(200 + Math.random() * 400);
      const msg = renderLog(section);
      const level = shouldFail && i === logCount - 1 ? "ERROR" : "INFO";
      setState((prev) =>
        prev.map((w) =>
          w.id !== wfId
            ? w
            : { ...w, logs: [...w.logs.slice(-200), { id: uid(), time: ts(), level, msg, section }] }
        )
      );
    }

    const sectionDuration = Date.now() - sectionStart;

    if (shouldFail) {
      sectionResults.push({ section, status: "failed", duration: sectionDuration });
      setState((prev) =>
        prev.map((w) =>
          w.id !== wfId
            ? w
            : {
                ...w,
                status: "error",
                currentSection: null,
                errorCount: w.errorCount + 1,
                health: clamp(w.health - 15, 0, 100),
                sectionProgress: { ...w.sectionProgress, [section]: "failed" },
                logs: [
                  ...w.logs.slice(-200),
                  { id: uid(), time: ts(), level: "ERROR", msg: `✗ Section failed: ${SECTION_LABELS[section]}`, section },
                ],
              }
        )
      );
      break;
    } else {
      sectionResults.push({ section, status: "done", duration: sectionDuration });
      setState((prev) =>
        prev.map((w) =>
          w.id !== wfId
            ? w
            : {
                ...w,
                sectionProgress: { ...w.sectionProgress, [section]: "done" },
                health: clamp(w.health + 1, 0, 100),
              }
        )
      );
    }

    await sleep(100);
  }

  if (signal.aborted) return;

  const cycleDuration = Date.now() - cycleStart;
  const allPassed = sectionResults.every((r) => r.status === "done");
  const cycleRecord = {
    id: cycleId,
    time: ts(),
    duration: cycleDuration,
    status: allPassed ? "success" : "failed",
    sections: sectionResults,
  };

  setState((prev) =>
    prev.map((w) => {
      if (w.id !== wfId) return w;
      const newTotal = w.totalDuration + cycleDuration;
      const newCount = w.cycleCount + 1;
      return {
        ...w,
        status: allPassed ? "idle" : "error",
        currentSection: null,
        cycleCount: newCount,
        lastRun: ts(),
        nextRun: Date.now() + def.intervalMs,
        avgDuration: Math.round(newTotal / newCount),
        totalDuration: newTotal,
        cycles: [cycleRecord, ...w.cycles].slice(0, 50),
        logs: [
          ...w.logs.slice(-200),
          {
            id: uid(),
            time: ts(),
            level: allPassed ? "SUCCESS" : "ERROR",
            msg: allPassed
              ? `✓ Cycle #${newCount} complete — ${cycleDuration}ms`
              : `✗ Cycle #${newCount} aborted after ${cycleDuration}ms`,
            section: null,
          },
        ],
      };
    })
  );
}

