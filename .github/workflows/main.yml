function StatusDot({ status, color }) {
  const map = {
    running: COLORS.accent,
    idle: COLORS.muted,
    error: COLORS.danger,
    success: COLORS.success,
  };
  const c = color || map[status] || COLORS.muted;
  return (
    <span style={{ position: "relative", display: "inline-block", width: 10, height: 10 }}>
      <span
        style={{
          position: "absolute",
          inset: 0,
          borderRadius: "50%",
          background: c,
          opacity: status === "running" ? 1 : 0.7,
        }}
      />
      {status === "running" && (
        <span
          style={{
            position: "absolute",
            inset: 0,
            borderRadius: "50%",
            background: c,
            animation: "pulse-ring 1.2s ease-out infinite",
          }}
        />
      )}
    </span>
  );
}

function HealthBar({ value, height = 4 }) {
  const color =
    value >= 80 ? COLORS.success : value >= 50 ? COLORS.warn : COLORS.danger;
  return (
    <div
      style={{
        height,
        background: "#21262d",
        borderRadius: 2,
        overflow: "hidden",
        flex: 1,
      }}
    >
      <div
        style={{
          height: "100%",
          width: `${value}%`,
          background: color,
          transition: "width 0.6s ease, background 0.4s",
          animation: "bar-fill 0.8s ease",
        }}
      />
    </div>
  );
}

function SectionPill({ section, status, color }) {
  const statusColor =
    status === "done"
      ? COLORS.success
      : status === "running"
      ? color || COLORS.accent
      : status === "failed"
      ? COLORS.danger
      : COLORS.muted;

  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 6,
        padding: "4px 10px",
        borderRadius: 4,
        border: `1px solid ${statusColor}33`,
        background: `${statusColor}11`,
        animation: status === "running" ? "glow-pulse 1.5s ease infinite" : "none",
        transition: "all 0.3s ease",
      }}
    >
      <StatusDot status={status === "done" ? "success" : status === "failed" ? "error" : status} />
      <span style={{ color: statusColor, fontSize: 11, letterSpacing: "0.04em" }}>
        {SECTION_LABELS[section] || section}
      </span>
      {status === "done" && (
        <span style={{ color: COLORS.success, fontSize: 10, marginLeft: "auto" }}>✓</span>
      )}
      {status === "failed" && (
        <span style={{ color: COLORS.danger, fontSize: 10, marginLeft: "auto" }}>✗</span>
      )}
      {status === "running" && (
        <span
          style={{
            marginLeft: "auto",
            width: 8,
            height: 8,
            border: `1.5px solid ${color || COLORS.accent}`,
            borderTopColor: "transparent",
            borderRadius: "50%",
            animation: "spin 0.8s linear infinite",
            display: "inline-block",
          }}
        />
      )}
    </div>
  );
}

function WorkflowCard({ wf, onClick, active }) {
  const lastCycle = wf.cycles[0];
  const successRate =
    wf.cycles.length === 0
      ? 100
      : Math.round((wf.cycles.filter((c) => c.status === "success").length / wf.cycles.length) * 100);

  const timeToNext = Math.max(0, wf.nextRun - Date.now());
  const countdownSec = Math.ceil(timeToNext / 1000);

  return (
    <div
      onClick={onClick}
      style={{
        background: active ? COLORS.surfaceAlt : COLORS.surface,
        border: `1px solid ${active ? wf.color + "55" : COLORS.border}`,
        borderRadius: 8,
        padding: "14px 16px",
        cursor: "pointer",
        transition: "all 0.2s ease",
        animation: "slide-in-up 0.3s ease",
        boxShadow: active ? `0 0 20px ${wf.color}22` : "none",
        position: "relative",
        overflow: "hidden",
      }}
    >
      {active && (
        <div
          style={{
            position: "absolute",
            left: 0,
            top: 0,
            bottom: 0,
            width: 3,
            background: wf.color,
            borderRadius: "0 2px 2px 0",
          }}
        />
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <span style={{ fontSize: 16, color: wf.color }}>{wf.icon}</span>
        <span style={{ fontFamily: "'Syne', sans-serif", fontSize: 13, fontWeight: 700, color: COLORS.text, letterSpacing: "0.02em" }}>
          {wf.name}
        </span>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
          <StatusDot status={wf.status} color={wf.color} />
          <span
            style={{
              fontSize: 9,
              letterSpacing: "0.12em",
              color: wf.status === "running" ? wf.color : wf.status === "error" ? COLORS.danger : COLORS.textDim,
              fontWeight: 600,
              textTransform: "uppercase",
            }}
          >
            {wf.status}
          </span>
        </div>
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
        <HealthBar value={wf.health} height={3} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
        <Metric label="Cycles" value={wf.cycleCount} />
        <Metric label="Success" value={`${successRate}%`} color={successRate >= 90 ? COLORS.success : successRate >= 70 ? COLORS.warn : COLORS.danger} />
        <Metric label={wf.status === "running" ? "Section" : "Next in"} value={wf.status === "running" && wf.currentSection ? (SECTION_LABELS[wf.currentSection] || wf.currentSection).slice(0, 10) + "…" : `${countdownSec}s`} color={wf.status === "running" ? wf.color : COLORS.textSub} />
      </div>
    </div>
  );
}

function Metric({ label, value, color }) {
  return (
    <div>
      <div style={{ fontSize: 9, color: COLORS.textDim, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
      <div style={{ fontSize: 13, fontWeight: 600, color: color || COLORS.text }}>{value}</div>
    </div>
  );
}

function LogLine({ entry }) {
  const levelColor =
    entry.level === "ERROR"
      ? COLORS.danger
      : entry.level === "SUCCESS"
      ? COLORS.success
      : entry.level === "WARN"
      ? COLORS.warn
      : COLORS.textSub;

  return (
    <div
      style={{
        display: "flex",
        gap: 10,
        padding: "2px 0",
        animation: "slide-in-left 0.2s ease",
        borderBottom: `1px solid ${COLORS.border}33`,
      }}
    >
      <span style={{ color: COLORS.textDim, flexShrink: 0, fontSize: 10 }}>
        {entry.time.slice(11)}
      </span>
      <span
        style={{
          color: levelColor,
          flexShrink: 0,
          fontSize: 9,
          letterSpacing: "0.1em",
          fontWeight: 700,
          minWidth: 52,
          textTransform: "uppercase",
        }}
      >
        {entry.level}
      </span>
      <span style={{ color: entry.level === "ERROR" ? COLORS.danger : entry.level === "SUCCESS" ? COLORS.success : COLORS.text, wordBreak: "break-all" }}>
        {entry.msg}
      </span>
    </div>
  );
}

function CycleBadge({ cycle }) {
  const pct = Math.round(
    (cycle.sections.filter((s) => s.status === "done").length / cycle.sections.length) * 100
  );
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        padding: "6px 10px",
        background: COLORS.surface,
        border: `1px solid ${cycle.status === "success" ? COLORS.successDim : COLORS.dangerDim}`,
        borderRadius: 6,
        animation: "slide-in-up 0.25s ease",
      }}
    >
      <span style={{ color: cycle.status === "success" ? COLORS.success : COLORS.danger, fontSize: 12 }}>
        {cycle.status === "success" ? "✓" : "✗"}
      </span>
      <span style={{ color: COLORS.textSub, fontSize: 10 }}>{cycle.time.slice(11)}</span>
      <span style={{ color: COLORS.text, fontSize: 11 }}>{cycle.duration}ms</span>
      <div style={{ flex: 1, height: 3, background: COLORS.border, borderRadius: 2, overflow: "hidden" }}>
        <div
          style={{
            height: "100%",
            width: `${pct}%`,
            background: cycle.status === "success" ? COLORS.success : COLORS.warn,
          }}
        />
      </div>
      <span style={{ color: COLORS.textDim, fontSize: 10 }}>{pct}%</span>
    </div>
  );
}

